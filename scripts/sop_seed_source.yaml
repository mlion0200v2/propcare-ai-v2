# scripts/sop_seed_source.yaml
version: v1
source: internal_sop

items:
  - id: sop_plumbing_faucet_leak_001
    title: Faucet leak (intermittent)
    category: plumbing
    issue_key: faucet_leak
    severity: low
    tenant_safe: true
    text: |
      Tenant-safe troubleshooting (do in order):
      1) Place towels/bucket to prevent cabinet/floor damage.
      2) If safe, turn OFF the shut-off valve(s) under the sink (clockwise).
      3) Note where the water appears: spout, handle, under-sink supply line, or P-trap.

      Stop and escalate immediately if:
      - Water cannot be stopped with the shut-off valves
      - Water is contacting electrical outlets
      - Leak is causing swelling/warping of cabinets/flooring

      What to send us (photos/video):
      - Photo of faucet/handle area
      - Photo under sink showing valves and any dripping
      - Short video showing the leak if it’s intermittent

  - id: sop_plumbing_under_sink_leak_001
    title: Under-sink leak (P-trap / supply line)
    category: plumbing
    issue_key: under_sink_leak
    severity: medium
    tenant_safe: true
    text: |
      Tenant-safe troubleshooting (do in order):
      1) Put a bucket under the leak and dry the area to locate the drip source.
      2) If safe, turn OFF the shut-off valve for the leaking line.
      3) Check if the drip is from the P-trap (curved pipe) or from supply line connections.

      Stop and escalate immediately if:
      - Active spraying or rapid leaking
      - Water spreading beyond the cabinet
      - Any signs of mold or cabinet swelling

      What to send us (photos/video):
      - Photo showing the leak source under the sink
      - Photo of shut-off valves
      - Video of active dripping if present

  - id: sop_electrical_breaker_tripped_001
    title: Breaker tripped (single circuit)
    category: electrical
    issue_key: breaker_tripped
    severity: medium
    tenant_safe: true
    text: |
      Tenant-safe troubleshooting (do in order):
      1) Unplug devices on the affected circuit.
      2) At the breaker panel, flip the breaker fully OFF then ON once.
      3) Plug devices back one by one.

      Stop and escalate immediately if:
      - Breaker trips repeatedly
      - You smell burning or see discoloration
      - Any sparks, smoke, or buzzing is present

      What to send us (photos/video):
      - Photo of the affected outlet/switch
      - Photo of the breaker label area (do not open panel covers)

  - id: sop_hvac_no_heat_001
    title: Furnace not heating
    category: hvac
    issue_key: furnace_no_heat
    severity: high
    tenant_safe: true
    text: |
      Tenant-safe troubleshooting (do in order):
      1) Confirm thermostat is set to HEAT and temperature is above room temp.
      2) Check furnace switch (often looks like a light switch nearby).
      3) Replace/clean filter if accessible and you know how to do it safely.

      Stop and escalate immediately if:
      - You smell gas or suspect gas leak (leave area, call emergency services)
      - You hear unusual loud banging or see smoke
      - No heat during cold weather conditions

      What to send us (photos/video):
      - Thermostat screen photo showing settings
      - Photo of furnace area (from a safe distance)

  - id: sop_appliance_dishwasher_not_draining_001
    title: Dishwasher not draining
    category: appliance
    issue_key: dishwasher_not_draining
    severity: medium
    tenant_safe: true
    text: |
      Tenant-safe troubleshooting (do in order):
      1) Cancel the cycle and avoid running again until checked.
      2) Remove and rinse the bottom filter (if accessible) and clear debris.
      3) Check if sink drain is also slow (may indicate shared drain issue).

      Stop and escalate immediately if:
      - Water is leaking onto the floor
      - Burning smell or unusual electrical behavior
      - Standing water persists after basic filter check

      What to send us (photos/video):
      - Photo of standing water inside dishwasher
      - Photo of filter area after removal